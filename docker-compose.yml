# Local / homelab deployment: backend + frontend (nginx) + PostgreSQL.
#
#   docker compose up -d          # emulator-backed stack (DPS_TRANSPORT=mock://)
#   open http://localhost:8081    # UI via nginx; /api and WS are proxied
#
# Real PSU attached to the docker host ("serial" profile — starts an extra
# backend wired to /dev/ttyUSB0 and points nginx at it):
#
#   BACKEND_UPSTREAM=backend-serial:8080 \
#     docker compose --profile serial up -d
#
# Storage is fail-soft: the backend starts and controls the device even if
# postgres is down; storage-backed features return 503 until it recovers.

services:
  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    environment:
      DPS_TRANSPORT: ${DPS_TRANSPORT:-mock://}
      DPS_DB_DRIVER: postgres
      DPS_DB_DSN: postgres://dps150:dps150@postgres:5432/dps150?sslmode=disable
    depends_on:
      - postgres
    restart: unless-stopped

  # Real-hardware variant: the PSU's USB-CDC port is passed through.
  # Enabled with --profile serial; set BACKEND_UPSTREAM=backend-serial:8080
  # so the frontend proxies to this instance.
  backend-serial:
    profiles: ["serial"]
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    environment:
      DPS_TRANSPORT: serial:///dev/ttyUSB0
      DPS_DB_DRIVER: postgres
      DPS_DB_DSN: postgres://dps150:dps150@postgres:5432/dps150?sslmode=disable
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
    environment:
      # nginx proxies /api (REST + WebSocket) to this upstream, preserving
      # the Host header — required by the backend's WS origin check.
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:8080}
    ports:
      - "8081:8080"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: dps150
      POSTGRES_PASSWORD: dps150
      POSTGRES_DB: dps150
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dps150 -d dps150"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:

{{- if .Values.vaultSecretsOperator.enabled -}}
# Database credentials for the CNPG-managed `dps150` role
# (same VSS pattern as infrastructure/k8s-talos-cluster partdb-db-vss.yaml).
#
# The Vault secret may not exist yet on the very first deploy — it is seeded
# by the pg-cluster provisioning (I-002). That is an EXPECTED state, not an
# error: VSO keeps retrying, the backend runs fail-soft without storage
# (device control works, /healthz stays 200), and once the secret lands VSO
# restarts the backend via rolloutRestartTargets.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ .Values.database.credsSecret }}
  labels:
    {{- include "dps150-web.labels" . | nindent 4 }}
spec:
  vaultAuthRef: {{ .Values.vaultSecretsOperator.vaultAuthRef }}
  mount: {{ .Values.vaultSecretsOperator.mount }}
  type: kv-v2
  path: {{ .Values.vaultSecretsOperator.dbSecretPath }}
  destination:
    name: {{ .Values.database.credsSecret }}
    create: true
    type: Opaque
    transformation:
      excludeRaw: true
      templates:
        username:
          text: {{ .Values.database.user | quote }}
        password:
          text: {{ `{{ .Secrets.password }}` | quote }}
  refreshAfter: 300s
  rolloutRestartTargets:
    - kind: Deployment
      name: {{ include "dps150-web.backend.fullname" . }}
---
# Pull credentials for the private GitLab container registry
# (kubernetes.io/dockerconfigjson, referenced by imagePullSecrets in both
# deployments; same per-app pattern as cattery's <app>/registry path).
#
# Unlike the DB secret above this one is a HARD deploy prerequisite: without
# it the pods sit in ImagePullBackOff and `helm --wait` times out. The Vault
# path is seeded with a read_registry deploy token and was verified live
# (VSS synced, test pod pulled an image) — seeding/rotation procedure:
# docs/runbooks/registry-pull-secret.md.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "dps150-web.registryCredsName" . }}
  labels:
    {{- include "dps150-web.labels" . | nindent 4 }}
spec:
  vaultAuthRef: {{ .Values.vaultSecretsOperator.vaultAuthRef }}
  mount: {{ .Values.vaultSecretsOperator.mount }}
  type: kv-v2
  path: {{ .Values.vaultSecretsOperator.registrySecretPath }}
  destination:
    name: {{ include "dps150-web.registryCredsName" . }}
    create: true
    type: kubernetes.io/dockerconfigjson
  refreshAfter: 300s
{{- end }}

{{- if .Values.ingress.enabled -}}
# Dedicated per-host certificate (not the shared wildcard), issued by the
# letsencrypt-cloudflare ClusterIssuer via DNS-01. Declared explicitly instead
# of relying on the ingress-shim annotation so the Certificate is a
# Helm-managed resource of this release.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ingress.tlsSecretName }}
  labels:
    {{- include "dps150-web.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.ingress.tlsSecretName }}
  issuerRef:
    name: {{ .Values.ingress.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.ingress.host | quote }}
{{- end }}

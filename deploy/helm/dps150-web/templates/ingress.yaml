{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dps150-web.fullname" . }}
  labels:
    {{- include "dps150-web.labels" . | nindent 4 }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.host }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Path-based split: API and health probes go to the Go backend,
          # everything else to the SPA. The WebSocket upgrade on /api/v1/ws
          # passes straight through Traefik (Host is preserved), and the
          # Authelia middleware annotation above applies to every path of
          # this host.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "dps150-web.backend.fullname" . }}
                port:
                  number: 8080
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: {{ include "dps150-web.backend.fullname" . }}
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dps150-web.frontend.fullname" . }}
                port:
                  number: 8080
{{- end }}

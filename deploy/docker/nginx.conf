# Frontend nginx config. Shipped as an envsubst template
# (/etc/nginx/templates/default.conf.template): the image entrypoint
# substitutes ${BACKEND_UPSTREAM} at startup (default backend:8080, set in
# Dockerfile.frontend — matches the docker-compose service; override the
# env var in k8s). nginx runtime variables ($host, $uri, ...) are left
# intact because the entrypoint only substitutes defined environment
# variables.

# WebSocket upgrade: forward Connection: upgrade only when the client asked
# for an upgrade.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API + WebSocket proxy to the backend. Host MUST be preserved verbatim
    # ($http_host keeps the port, unlike $host): the backend's WebSocket
    # accept (coder/websocket) authorizes the browser Origin against the
    # Host header and rejects the upgrade with 403 on mismatch — the same
    # trap already hit with the vite dev proxy (see vite.config.ts).
    location /api/ {
        proxy_pass http://${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Hashed build assets are immutable — cache aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown routes are handled client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
